name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"
  GOLANGCI_VERSION: "v2.1.6"

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@v0.7.0
          test -z "$(gofumpt -l .)" || { gofumpt -d .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # v7+ is required for golangci-lint v2 (the v2.x config this repo uses).
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          bash scripts/govulncheck.sh ./...
      - name: Unit tests
        run: go test -race ./...

  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint

  build:
    name: Build desktop binary
    needs: [backend, frontend]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -ldflags "-X main.version=$(git describe --tags --always --dirty)"
